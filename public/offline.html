<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0F766E" />
    <title>HanQuran — Offline</title>
    <style>
      :root {
        color-scheme: only light;
        --bg: #fafaf8;
        --fg: #111827;
        --muted: #6b7280;
        --primary: #0f766e;
        --card: #ffffff;
        --border: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
      }

      main {
        width: 100%;
        max-width: 28rem;
        text-align: center;
      }

      .logo {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        border-radius: 14px;
        display: block;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px 24px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.25rem;
        font-weight: 700;
      }

      p {
        margin: 0;
        font-size: 0.95rem;
        line-height: 1.6;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 24px;
      }

      button,
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
      }

      button {
        border: none;
        background: var(--primary);
        color: #fff;
      }

      a.secondary {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--fg);
      }

      .hint {
        margin-top: 16px;
        font-size: 0.8rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <svg
        class="logo"
        viewBox="0 0 56 56"
        width="56"
        height="56"
        aria-hidden="true"
        focusable="false"
      >
        <rect width="56" height="56" rx="14" fill="#0f766e" />
        <text
          x="28"
          y="36"
          text-anchor="middle"
          fill="#ffffff"
          font-size="22"
          font-weight="700"
          font-family="system-ui, sans-serif"
        >
          H
        </text>
      </svg>
      <div class="card">
        <h1>Anda sedang offline</h1>
        <p>
          HanQuran tidak dapat memuat halaman ini tanpa koneksi. Jika Anda sudah
          pernah membuka aplikasi atau mengunduh audio, coba muat ulang saat
          jaringan kembali.
        </p>
        <div class="actions">
          <button type="button" onclick="window.location.reload()">
            Muat ulang
          </button>
          <a class="secondary" href="/">Ke beranda</a>
        </div>
        <p class="hint">
          Konten hafalan yang sudah diunduh tetap dapat diputar saat offline.
        </p>
      </div>
    </main>
  </body>
</html>
